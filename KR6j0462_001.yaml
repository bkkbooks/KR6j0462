body:
  text: 西天譯經三藏朝散大夫試鴻臚少卿傳教大師臣法天奉詔譯歸命禮正覺及法賢聖僧菩薩説此明所説破障礙吠多拏羯吒布多曩一切根本呪法藥叉及羅剎娑衆所作邪法此明能破恆令正行若有情懇虔誠一心受持此明呪者或以絹帛書寫或以樺皮紙等書寫彼一切處諸惡鬼魅生決定慈消除災障成最上事若戴項上入於軍陳人互相殺彼能護持心離迷怖不損一毛若戴手臂之上速得勝利如佛説言若有男子女人受持此明所欲之事一切成就若王法禁繫若行曠野遇師子虎狼之難若行路中遇賊盜相隨此大明力而能救護令離諸怖獲得安樂若有女人頂戴受持常得眷屬心生愛敬恆獲財寶若復懷胎産難速得平安菩薩所説大明之呪晝夜護持恆時亦然若有智者一心受持若行若立若坐若臥鬼魅諸難而不能害乃至酒醉睡眠亦無惡夢彼無能勝明若執持讀誦所有國王聚落衆人鬪諍一切障難悉皆消散爾時無能勝菩薩告諸魔言我今説明汝部多衆聽吾所説菩薩見彼諸惡魔軍具種種形色住立於前為彼魔軍説如是言我俱胝劫為求菩提捨自身命妻子財寶難作能作行大精進利益安樂一切衆生行願圓滿住菩提樹證真實法殷勤保重時有魔王領惡軍兵而來障礙以明呪力彼等降伏我所思惟往昔魔侶降彼隨喜過去冤家而自破壞我今説明破壞魔軍大明呪曰怛𭔞他引護嚕護嚕贊拏引禮摩引鄧詣娑嚩二合引賀無能勝菩薩説此明時變身為天女像住立魔前生悲慜心合掌頂上説如是言菩薩清淨心如我説勝義大智大光明永斷愚癡暗往昔求菩提魔軍今已降降彼魔衆已而獲大無畏永出於世間決定成正覺為彼天人師速疾度群品汝等一切見心生大歡喜魔王諸眷屬無蹈尼連岸今以明呪力破彼煩惱蓋是時無能勝菩薩以微妙梵音聲遍十方即説明曰怛儞野二合他引阿𡁠旦惹曳引惹演諦阿鉢囉二合諦賀諦引麼隸引麼羅麼囉嚩諦麼賀引麼羅嚩諦尾惹演諦尾惹曳引薩哩嚩二合悉馱曩麼塞訖哩二合諦引儞愈二合諦儞尾馱哩引尾囉婆捺哩二合引阿麼哩引尾𡫸切身諦引哆尼諦引阿𡁠諦引阿曩契引阿婆曳引嚩囉儞摩引囉賽儞野二合鉢囉二合摩哩那二合儞曳引娑嚩二合引賀引摩引囉賽儞野二合尾曩引娑儞曳引娑嚩二合引賀引尾儞野二合引野娑嚩二合引賀引室鑁迦哩曳引娑嚩二合引賀引扇引諦迦哩曳引娑嚩二合引賀引室哩二合夜引曳引娑嚩二合引賀引野戍引摩諦室哩二合摩諦薩哩嚩二合羯哩摩二合迦囉尼薩哩嚩二合引囉他二合娑引達儞薩哩嚩二合引囉他二合鉢囉二合嚩引馱儞薩哩嚩二合夢誐囉娑引馱儞摩努引囉替引摩賀引摩努引囉替引薩哩嚩二合𡫸切嚩曩摩娑訖哩三合諦引薩哩嚩二合薩怛嚩二合呬哆迦囉抳薩哩嚩二合引呬哆儞挽哩哆二合儞尾引倪尾引倪摩賀引尾引倪仡哩二合那焰鉢囉二合尾舍引弭諦引伊致迷致摩賀引詣隸麼迷引鉢扇覩薩哩嚩二合播引波迦娑嚩二合賀引吒迦娑嚩二合賀引吒迦致引吒迦嚩囉致引吒迦吒迦抳引誐拏嚩囉抳引賀引哩諦室哩二合摩諦底瑟姹二合底瑟姹二合句囕惹哩引拏摩摩達哩麼二合迦囉細引曩寫設波哩嚩引囉寫薩哩嚩二合摩呬旦儞嚩引囉野娑嚩三合賀引阿詣曩詣引哆詣引哆囉詣引哆致娑細引伊隸弭隸呬隸弭隸尾隸引隸隸尾隸凄隸卑隸尾隸引弭隸引隸隸引契隸唧隸引隸隸引𡫸切身詣阿詣引曩詣引哆隸引哆囉詣引哆致引娑細引嚩囉抳引嚩諦引印捺嚕二合囉引惹夜謨引囉引惹嚩嚕尼爼二合囉引惹蘇謨引囉引惹尾惹野半左謨引囉引惹難拏計囉引惹作羯囉二合尾惹曳囉引惹尾惹演覩引囉引惹度哩二合哆囉引瑟吒囉三合囉引惹尾嚕𠻬俱引囉引惹尾嚕博乞芻二合囉引惹俱尾嚕引囉引惹摩曩歲囉引惹嚩蘇枳囉引惹沒囉二合憾摩二合娑賀娑囉二合引地鉢諦囉引惹沒度引婆誐鑁引達哩摩二合娑嚩二合弭囉引惹曩摩娑覩二合半左引覩迦引野隸隸娑嚩二合引賀引設囉二合憾弭二合引沒囉二合憾摩二合娑嚩二合哩引布攞抳二合布囉拏二合摩褥引囉替引阿致引嚩致引站計引吒囕計引迦囉迦唧引尾孕二合努摩賀引尾孕二合努阿鼻娑引嚕摩賀引鼻娑引嚕𭉷護沒護護護蘇補瑟卑二合蘇嚩引悉悉哆引囕抳引曩引囉泥引儞弭引儞弭引祖囉拏二合迦引隸摩賀引祖囉拏二合迦引隸祖囉拏二合迦引隸閉哆難諦摩迦囉難諦伊賀摩引曩細引尾賀摩引曩細引伊賀賀努尾賀賀努嚩護波哩嚩引哩倪哩波哩嚩引哩引阿難哆波哩嚩引哩引怛賴二合引路枳野二合波哩嚩引哩引覽弭引鉢囉二合覽弭引迦覽弭引迦羅世引迦羅戍那哩迦羅戍隸必諦二合弭隸引尾隸引唧隸薩哩嚩二合路引迦引挽哩哆二合儞曳引娑嚩二合賀引薩哩嚩合路引迦尾挽馱儞曳引娑嚩二合賀迦引羅作羯哩二合作羯囉二合挽哩諦二合底瑟姹二合底瑟姹二合句囕惹哩引拏摩摩達哩麼二合引迦囉細引曩寫薩波哩嚩引囉寫薩哩嚩二合引呬旦儞嚩引囉野娑嚩二合引賀引阿曩曳引阿曩野摩諦引部諦引部旦引諦引計愈哩引三滿哆婆捺哩二合引那弭引左囉尼呬隸呬隸娑嚩二合引賀引摩賀引迦引嚕抳迦入設娑哆二合引賀娑哆二合引倪哩二合引拏馱囉抳演二合娑必哩三合世引哆必哩二合體尾焰二合引左誐哆入攝那薩哩嚩二合摩引囉波囉引惹藥吒建諦引吒迦嚩囕諦引仡哩二合恨赧二合諦引仡哩二合恨拏二合嚩囕諦引尸囕諦引尸囉嚩囕諦引底瑟姹二合底瑟姹二合但囕惹哩引拏摩摩達哩麼二合迦囉細引曩寫薩波哩嚩引囉寫薩哩嚩二合呬旦儞嚩引囉野娑嚩二合引賀阿仡哩二合引